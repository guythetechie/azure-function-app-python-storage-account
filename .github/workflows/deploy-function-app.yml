name: Deploy function app

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy_function_app:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Logon to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Create deployment stack
        env:
            ALLOWED_IP_ADDRESSES: ${{ vars.ALLOWED_IP_ADDRESSES }}
            AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
            DEPLOYMENT_STACK_NAME: ${{ vars.DEPLOYMENT_STACK_NAME }}
            ENTRA_ADMIN_OBJECT_IDS: ${{ vars.ENTRA_ADMIN_OBJECT_IDS }}
            TEMPLATE_FILE_PATH: "${{ github.workspace }}/bicep/main.bicep"
        run: |
            set -euo pipefail

            # echo "Getting runner public IP address..."
            # RUNNER_PUBLIC_IP=$(curl -fsSL https://api.ipify.org)

            # if [ -z "$ALLOWED_IP_ADDRESSES" ]; then
            #   EFFECTIVE_ALLOWED_IP_ADDRESSES="$RUNNER_PUBLIC_IP"
            # else
            #   EFFECTIVE_ALLOWED_IP_ADDRESSES="$ALLOWED_IP_ADDRESSES,$RUNNER_PUBLIC_IP"
            # fi

            # echo "Creating deployment stack..."
            # az stack sub create \
            #   --action-on-unmanage "deleteAll" \
            #   --deny-settings-mode "None" \
            #   --location "$AZURE_LOCATION" \
            #   --name "$DEPLOYMENT_STACK_NAME" \
            #   --parameters allowedIpAddressesCsv="$EFFECTIVE_ALLOWED_IP_ADDRESSES" \
            #   --parameters deploymentStackName="$DEPLOYMENT_STACK_NAME" \
            #   --parameters entraAdminObjectIds="$ENTRA_ADMIN_OBJECT_IDS" \
            #   --parameters location="$AZURE_LOCATION" \
            #   --template-file "$TEMPLATE_FILE_PATH" \
            #   --yes
      - name: Publish function app
        env:
          DEPLOYMENT_STACK_NAME: ${{ vars.DEPLOYMENT_STACK_NAME }}
          ZIP_FILE_PATH: ${{ runner.temp }}/function-app.zip
        run: |
          set -euo pipefail

          echo "Creating zip file..."
          cd "${{ github.workspace }}/src/functionapp"
          zip -r "$ZIP_FILE_PATH" . \
            -x '.venv/*' \
            -x '__pycache__/*' \
            -x '*/__pycache__/*' \
            -x '*.pyc' \
            -x 'local.settings.json'

          echo "Publishing function app..."
          DEPLOYMENT_STACK=$(az stack sub show -n "$DEPLOYMENT_STACK_NAME")
          RESOURCE_GROUP_NAME=$(echo "$DEPLOYMENT_STACK" | jq -r '.outputs.resourceGroupName.value')
          FUNCTION_APP_NAME=$(echo "$DEPLOYMENT_STACK" | jq -r '.outputs.functionAppName.value')
          az functionapp deployment source config-zip \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --build-remote true \
            --src "$ZIP_FILE_PATH"
